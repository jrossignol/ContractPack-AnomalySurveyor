// Contract for the snowman on Eeloo
// Author: jaheay

// OPM moves Eeloo and does not move the static to compensate.
// If Easter Eggs Restored is installed, the contract is available on the restored OPM location.
CONTRACT_TYPE
{
    name = AS_Eeloo_Snowkerbal
    group = AnomalySurveyor

    sortKey = 06.00
    genericTitle = Undiscovered anomaly on @targetBody
    genericDescription = Eeloo is cold, distant, and apparently decorative.

    title = Investigate an unusual object on Eeloo
    description = Long-range imaging has identified an unusual object on Eeloo.  It is small, but regular enough that we should send someone to inspect it.
    synopsis = Investigate the unusual object on Eeloo.
    completedMessage = Snowman confirmed.  That was not the answer we expected.

    tag = SCANsat
    prestige = Exceptional
    targetBody = Eeloo
    agent = Anomaly Surveyor Group
    maxCompletions = 1

    rewardFunds = 95000.0
    rewardScience = 12.0
    rewardReputation = 7.0

    DATA
    {
        type = double
        latitude = 25.99796566402
        longitude = 110.591988735867
        altitude = 1
    }

    PARAMETER
    {
        name = WP0
        type = All
        title = Investigate the unusual object

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType
            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint
            index = 0
            distance = 15
        }
    }

    BEHAVIOUR
    {
        name = WaypointGenerator
        type = WaypointGenerator

        WAYPOINT
        {
            name = Unusual Object
            icon = ContractPacks/AnomalySurveyor/Icons/unknown
            latitude = @/latitude
            longitude = @/longitude
            altitude = @/altitude
        }
    }

    BEHAVIOUR
    {
        type = DialogBox

        DIALOG_BOX
        {
            title = Unusual Object
            condition = PARAMETER_COMPLETED
            parameter = WP0

            KERBAL
            {
                animation = idle_wonder
            }

            TEXT
            {
                text = It is a snowman made from rocket parts.
            }
        }

        DIALOG_BOX
        {
            title = Unusual Object
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = idle_lookAround
            }

            TEXT
            {
                text = Well... someone had to wait for their transfer window.
            }
        }

        DIALOG_BOX
        {
            title = Unusual Object
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Instructor_Wernher
                animation = idle_lookAround
            }

            TEXT
            {
                text = There are no signs of habitation.
            }
        }

        DIALOG_BOX
        {
            title = Unusual Object
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = true_nodA
            }

            TEXT
            {
                text = Except the snowman.
            }
        }
    }

    REQUIREMENT
    {
        name = Orbit
        type = Orbit
    }

    REQUIREMENT:NEEDS[SCANsat]
    {
        name = WP0
        type = SCANsatLocationCoverage
        latitude = @/latitude
        longitude = @/longitude
        title = Must have scanned the correct location on @targetBody with the anomaly scanner
    }
}

// Disable under OPM unless Easter Eggs Restored is present.
!CONTRACT_TYPE[AS_Eeloo_Snowkerbal]:NEEDS[OPM,!EasterEggsRestored] {}

// Easter Eggs Restored moves the Snowkerbal on OPM Eeloo.
@CONTRACT_TYPE[AS_Eeloo_Snowkerbal]:NEEDS[EasterEggsRestored,OPM]
{
    @DATA
    {
        @latitude = 25.99797157371744
        @longitude = 110.59214556333842
        @altitude = 1
    }
}
