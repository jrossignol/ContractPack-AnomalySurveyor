// Contract for the goddard rocket on Kerbin
// Author: jaheay

CONTRACT_TYPE
{
    name = AS_Kerbin_GoddardRocket
    group = AnomalySurveyor

    sortKey = 00.06
    genericTitle = Undiscovered anomaly on Kerbin
    genericDescription = Kerbin has old hardware hidden in odd corners.

    title = Investigate a site near the desert airfield
    description = A small structure has been spotted near the old desert launch site.  It may be nothing, but it is close enough to established facilities that we should document it properly.
    synopsis = Investigate the site near the desert airfield.
    completedMessage = A small beginning, but an important one.

    tag = SCANsat
    prestige = Trivial
    targetBody = Kerbin
    agent = Anomaly Surveyor Group
    maxCompletions = 1

    rewardFunds = 18000.0
    rewardScience = 2.0
    rewardReputation = 2.0

    DATA
    {
        type = double
        latitude = -6.517970820183
        longitude = -144.015969246974
        altitude = 1
    }

    PARAMETER
    {
        name = WP0
        type = All
        title = Investigate the desert site

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType
            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint
            index = 0
            distance = 75
        }
    }

    BEHAVIOUR
    {
        name = WaypointGenerator
        type = WaypointGenerator

        WAYPOINT
        {
            name = Desert Site
            icon = ContractPacks/AnomalySurveyor/Icons/unknown
            latitude = @/latitude
            longitude = @/longitude
            altitude = @/altitude
        }
    }

    BEHAVIOUR
    {
        type = DialogBox

        DIALOG_BOX
        {
            title = Desert Site
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Instructor_Wernher
                animation = true_nodA
            }

            TEXT
            {
                text = It is not much to look at now, but the idea is sound.
            }
        }
    }

    REQUIREMENT
    {
        name = ReachSpace
        type = ReachSpace
    }

    REQUIREMENT:NEEDS[SCANsat]
    {
        name = WP0
        type = SCANsatLocationCoverage
        latitude = @/latitude
        longitude = @/longitude
        title = Must have scanned the correct location on @targetBody with the anomaly scanner
    }
}
