// Contract for visiting Baikerbanur.

CONTRACT_TYPE
{
    name = AS_Kerbin_Baikerbanur
    group = AnomalySurveyor

    sortKey = 00.04.1
    genericTitle = Undiscovered signal site on Kerbin
    genericDescription = Some signals are not quite what they first appear to be.

    title = Investigate an unusual signal site on Kerbin
    description = One of the surface signal traces does not look like the others.  The location has been marked for close inspection.
    synopsis = Investigate the unusual signal site.
    completedMessage = The site is stranger than expected, but not a monolith.

    // Level 2 prestige
    prestige = Trivial

    targetBody = Kerbin

    // Always offered by the Anomaly Surveyor Group
    agent = Anomaly Surveyor Group

    // Can do the contract once
    maxCompletions = 1

    // Contract rewards
    rewardFunds = 40000
    rewardScience = 40.0
    rewardReputation = 20.0

    DATA
    {
        type = double
        latitude = 20.583161921487989
        longitude = 213.48827521068944
        altitude = 0.0
    }

    PARAMETER
    {
        name = WP0
        type = All
        title = Visit the unusual signal site

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType

            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint

            index = 0
            distance = 120
        }
    }

    BEHAVIOUR
    {
        name = WaypointGenerator
        type = WaypointGenerator

        WAYPOINT
        {
            // The name of the waypoint - displayed on the marker
            name = Unusual Signal Site
            icon = ContractPacks/AnomalySurveyor/Icons/unknown

            // The location
            latitude = @/latitude
            longitude = @/longitude
            altitude = @/altitude
        }
    }

    BEHAVIOUR
    {
        type = DialogBox

        DIALOG_BOX
        {
            title = Baikerbanur

            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = idle_lookAround
            }

            TEXT
            {
                text = Looks like the abandonded launch facility called Baikerbanur.  Were there other Kerbals that made it into space before us?
            }
        }
    }

    REQUIREMENT
    {
        type = CompleteContract

        contractType = AS_Kerbin_Monolith

        title = Must have discovered a similar anomaly
    }
}
