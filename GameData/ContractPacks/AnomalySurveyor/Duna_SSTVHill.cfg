// Contract for the sstv hill on Duna with the decoded sstv image
// Author: jaheay + mmsstv (https://hamsoft.ca/pages/mmsstv.php)

CONTRACT_TYPE
{
    name = AS_Duna_SSTVHill
    group = AnomalySurveyor

    sortKey = 02.02
    genericTitle = Undiscovered anomaly on @targetBody
    genericDescription = Duna keeps transmitting things it has no business transmitting.

    title = Investigate an unusual signal on Duna
    description = A weak signal has been detected from the surface of Duna.  The source appears to be near the southern ice, and we would like a closer look.
    synopsis = Investigate the signal source on Duna.
    completedMessage = Signal confirmed as a drawing by a small Kerbal child, depicting Jeb, Bob, Bill and Valentina. We are still not sure how it got there.

    tag = SCANsat
    prestige = Significant
    targetBody = Duna
    agent = Anomaly Surveyor Group
    maxCompletions = 1

    rewardFunds = 60000.0
    rewardScience = 8.0
    rewardReputation = 5.0

    DATA
    {
        type = double
        latitude = -66.048469798984
        longitude = -160.883266359908
        altitude = 1
    }

    PARAMETER
    {
        name = WP0
        type = All
        title = Investigate the signal source

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType
            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint
            index = 0
            distance = 350
        }
    }

    BEHAVIOUR
    {
        name = WaypointGenerator
        type = WaypointGenerator

        WAYPOINT
        {
            name = Signal Source
            icon = ContractPacks/AnomalySurveyor/Icons/unknown
            latitude = @/latitude
            longitude = @/longitude
            altitude = @/altitude
        }
    }

    BEHAVIOUR
    {
        type = DialogBox


         DIALOG_BOX
        {
            title = Signal Decoded

            condition = PARAMETER_COMPLETED
            parameter = WP0

            position = CENTER

            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = idle_wonder
            }

            TEXT
            {
                text = The strange signal appears to be an Slow-Scan Television (SSTV) signal, and it resolves into a recognizable image!
                fontSize = 16
            }
        }

        DIALOG_BOX
        {
            title = Signal Decoded

            condition = PARAMETER_COMPLETED
            parameter = WP0

            position = CENTER
            width = 0.5

            IMAGE
            {
                url = ContractPacks/AnomalySurveyor/Images/duna_sstv
            }

            TEXT
            {
                text = Its origin and purpose are still unclear.
                fontSize = 16
            }
        }
    }

    REQUIREMENT
    {
        name = Orbit
        type = Orbit
    }

    REQUIREMENT:NEEDS[SCANsat]
    {
        name = WP0
        type = SCANsatLocationCoverage
        latitude = @/latitude
        longitude = @/longitude
        title = Must have scanned the correct location on @targetBody with the anomaly scanner
    }
}
