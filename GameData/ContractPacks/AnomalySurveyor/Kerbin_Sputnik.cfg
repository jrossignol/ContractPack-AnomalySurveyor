// Contract for the sputnik on Kerbin
// Author: jaheay

CONTRACT_TYPE
{
    name = AS_Kerbin_Sputnik
    group = AnomalySurveyor

    sortKey = 00.04.4
    genericTitle = Undiscovered anomaly on Kerbin
    genericDescription = Kerbin still has a few historical scraps in inconvenient places.

    title = Investigate an old crash site on Kerbin
    description = We have reports of a small object embedded in the terrain.  It does not appear to be natural debris, so we would like someone to take a closer look.
    synopsis = Investigate the old crash site.
    completedMessage = It looks like someone tried getting to space before we did.

    tag = SCANsat
    prestige = Trivial
    targetBody = Kerbin
    agent = Anomaly Surveyor Group
    maxCompletions = 1

    rewardFunds = 18000.0
    rewardScience = 2.0
    rewardReputation = 2.0

    DATA
    {
        type = double
        latitude = -17.53417263567205
        longitude = 61.06202541590810
        altitude = 1
    }

    PARAMETER
    {
        name = WP0
        type = All
        title = Investigate the old crash site

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType
            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint
            index = 0
            distance = 15
        }
    }

    BEHAVIOUR
    {
        name = WaypointGenerator
        type = WaypointGenerator

        WAYPOINT
        {
            name = Old Crash Site
            icon = ContractPacks/AnomalySurveyor/Icons/unknown
            latitude = @/latitude
            longitude = @/longitude
            altitude = @/altitude
        }
    }

    BEHAVIOUR
    {
        type = DialogBox

        DIALOG_BOX
        {
            title = Crash Site
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = idle_lookAround
            }

            TEXT
            {
                text = Launched from the dusty steppes of Baikerbanur, this humble little sphere carried the first whispers from space to Kerbin. Every deep-space probe, relay network, and daring voyage beyond Kerbin owes a little something to this polished sphere.
            }
        }

        DIALOG_BOX
        {
            title = Crash Site
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Strategy_ScienceGuy
                animation = idle_lookAround
            }

            TEXT
            {
                text = What does it say on the back?
            }
        }

        DIALOG_BOX
        {
            title = Crash Site
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Instructor_Wernher
                animation = true_nodB
            }

            TEXT
            {
                text = Roughly translated, it says 'Chief Designer!' ... I have colleagues from that part of Kerbin.
            }
        }
    }

    REQUIREMENT
    {
        name = ReachSpace
        type = ReachSpace
    }

    REQUIREMENT
    {
        name = CompleteTMA2
        type = CompleteContract
        contractType = AS_Kerbin_Monolith_Additional.1
        title = Must have investigated TMA-2
    }

    REQUIREMENT:NEEDS[SCANsat]
    {
        name = WP0
        type = SCANsatLocationCoverage
        latitude = @/latitude
        longitude = @/longitude
        title = Must have scanned the correct location on @targetBody with the anomaly scanner
    }
}
