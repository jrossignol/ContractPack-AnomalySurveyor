// Contract for the monolith on Ovok.
// Author: jaheay
// Requires Outer Planets Mod.

CONTRACT_TYPE:NEEDS[OPM]
{
    name = AS_OPM_OvokMonolith
    group = AnomalySurveyor

    sortKey = 06.04
    genericTitle = Undiscovered anomaly on @targetBody
    genericDescription = A weak monolith-like shape has been detected near Ovok. The body is small, but the signal is specific enough to send a crew.

    title = Investigate unusual site on Ovok
    description = An unusual monolith-like shape has been detected on Ovok. Land nearby and investigate the site.
    synopsis = Investigate the unusual shape on Ovok.
    completedMessage = Another monolith has been confirmed. It continues to provide no answers, but it does provide a lot of questions.

    prestige = Exceptional
    targetBody = Ovok
    agent = Anomaly Surveyor Group
    maxCompletions = 1

    rewardFunds = 150000.0
    rewardScience = 18.0
    rewardReputation = 8.0

    DATA
    {
        type = double
        latitude = 23.77568105825619
        longitude = 60.04599622750532
        altitude = 0.0
    }

    PARAMETER
    {
        name = WP0
        type = All
        title = Visit the Ovok monolith

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType
            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint
            index = 0
            distance = 25
        }
    }

    BEHAVIOUR
    {
        name = WaypointGenerator
        type = WaypointGenerator

        WAYPOINT
        {
            name = Ovok Monolith
            icon = ContractPacks/AnomalySurveyor/Icons/monolith
            latitude = @/latitude
            longitude = @/longitude
            altitude = @/altitude
        }
    }

    BEHAVIOUR
    {
        type = DialogBox

        DIALOG_BOX
        {
            title = Ovok Monolith
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Strategy_ScienceGuy
                animation = idle_wonder
            }

            TEXT
            {
                text = I thought we found them all.
            }
        }

        DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = idle_lookAround
            }

            TEXT
            {
                text = This one doesnt appear to be sending any kind of signal, maybe has lost connection to the others?
            }
        }
    }

    REQUIREMENT
    {
        type = FlyBy
    }

    REQUIREMENT
    {
        type = CompleteContract
        contractType = AS_Minmus_Monolith

        title = Must have investigated the Minmus monolith first
    }

    // Ovoks sphere of influence is only about 23.4 km, so SCANsat anomaly scanning is not required here.
    // REQUIREMENT:NEEDS[SCANsat]
    // {
    //     name = WP0
    //     type = SCANsatLocationCoverage
    //     scanType = Anomaly
    //
    //     latitude = @/latitude
    //     longitude = @/longitude
    //
    //     title = Must have scanned the correct location on @targetBody with the anomaly scanner
    // }
}
