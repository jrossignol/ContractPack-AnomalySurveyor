// Contract for the whale skeleton on Tekto.
// Author: jaheay
// Requires Outer Planets Mod.

CONTRACT_TYPE:NEEDS[OPM]
{
    name = AS_OPM_Tekto_WhaleSkeleton
    group = AnomalySurveyor

    sortKey = 06.03
    genericTitle = Undiscovered anomaly on @targetBody
    genericDescription = Surface imagery from Tekto has identified an unusual structure on the terrain. It resembles a previous survey target closely enough to warrant investigation.

    title = Investigate unusual structure on Tekto
    description = Surface imagery from Tekto shows an unusual structure similar to the one previously found on Laythe. Land nearby and inspect it on EVA.
    synopsis = Investigate the unusual structure on Tekto.
    completedMessage = It is still not proof that space whales are real.

    // Indicates a contract where SCANsat multipliers should be applied
    tag = SCANsat

    prestige = Exceptional
    targetBody = Tekto
    agent = Anomaly Surveyor Group
    maxCompletions = 1

    rewardFunds = 190000.0
    rewardScience = 20.0
    rewardReputation = 8.0

    DATA
    {
        type = double
        latitude = 0.073636138822851818
        longitude = -162.52471712464333
        altitude = 0
    }

    PARAMETER
    {
        name = WP0
        type = All
        title = Investigate the unusual structure

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType
            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint
            index = 0
            distance = 35
        }
    }

    BEHAVIOUR
    {
        name = WaypointGenerator
        type = WaypointGenerator

        WAYPOINT
        {
            name = Unusual Structure
            icon = ContractPacks/AnomalySurveyor/Icons/unknown
            latitude = @/latitude
            longitude = @/longitude
            altitude = @/altitude
        }
    }

    BEHAVIOUR
    {
        type = DialogBox

        DIALOG_BOX
        {
            title = Unusual Structure
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Strategy_ScienceGuy
                animation = idle_wonder
            }

            TEXT
            {
                text = Space whales!  I knew it.
            }
        }

        DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = false_disagreeC
            }

            TEXT
            {
                text = We have even more evidence, but the official position remains unchanged.
            }
        }
    }

    REQUIREMENT
    {
        type = FlyBy
    }

    REQUIREMENT
    {
        type = CompleteContract
        contractType = AS_Laythe_WhaleSkeleton

        title = Must have investigated the similar structure on Laythe first
    }

    REQUIREMENT:NEEDS[SCANsat]
    {
        name = WP0
        type = SCANsatLocationCoverage
        scanType = Anomaly

        latitude = @/latitude
        longitude = @/longitude

        title = Must have scanned the correct location on @targetBody with the anomaly scanner
    }
}
