// Contract for the Homeworld randolith.
//   Author: nightingale

CONTRACT_TYPE
{
    name = AS_HomeWorld_Randolith
    group = AnomalySurveyor

    sortKey = 00.00
    genericTitle = Strange signal on HomeWorld()
    genericDescription = TODO

    title = TODO - Randolith
    description = TODO
    synopsis = TODO
    completedMessage = TODO

    // Level 2 prestige
    prestige = Significant

    targetBody = HomeWorld()

    // Always offered by the Anomaly Surveyor Group
    agent = ASG2

    // Can only do this contract once
    maxCompletions = 1

    // Contract rewards
    // TODO
    rewardFunds = 30000.0
    rewardScience = 20.0
    rewardReputation = 15.0

    DATA
    {
        type = string
        hidden = true

        vessel = @/targetBody.Name() + " Scanner"
    }

    PARAMETER
    {
        type = VesselParameterGroup

        define = @/vessel

        PARAMETER
        {
            type = PartValidation

            FILTER
            {
                MODULE
                {
                    name = ModuleKerbNetAccess
                }
            }

            minCount = 1
        }

        PARAMETER
        {
            type = ReachState

            situation = ORBITING
            targetBody = @/targetBody
        }
    }    

    PARAMETER
    {
        name = ScanAnomaly
        type = AnomalyScan
        
        vessel = @/vessel
    }


    PARAMETER
    {
        name = WP0
        type = All
        title = Visit TMA

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType

            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint

            index = 0
            distance = 15
        }
    }

    BEHAVIOUR
    {
        name = WaypointGenerator
        type = WaypointGenerator

        PQS_CITY
        {
            // The name of the waypoint - displayed on the marker
            name = Randolith
            icon = ContractPacks/AnomalySurveyor/Icons/monolith

            parameter = ScanAnomaly

            // The location
            pqsCity = Randolith
        }
    }

    BEHAVIOUR
    {
        type = DialogBox

        DIALOG_BOX
        {
            title = TMA

            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = idle_wonder
            }

            TEXT
            {
                text = Imagine, right in our backyard and we never saw it.  Maybe if we had some windows in the administration building.
            }
        }
    }
}
