// Contract for the stranded Opportunity rover on Duna
// Opportunity's landing site was 1.95° S, 5.53° W (354.47° E) in Meridiani Planum.
// Spirit's was 14.57° S, 175.47° E in Gusev Crater.
// Since this is around 2°24 S, 5°19 W, it is definitely Opportunity.
// Author: jaheay

CONTRACT_TYPE
{
    name = AS_Duna_Opportunity
    group = AnomalySurveyor

    sortKey = 02.03
    genericTitle = Undiscovered anomaly on @targetBody
    genericDescription = Something small and mechanical is sitting on Duna.

    title = Investigate a metallic object on Duna
    description = Surface imagery shows a small metallic object on Duna.  It does not match any registered Kerbal mission hardware, so we should inspect it directly.
    synopsis = Investigate the metallic object on Duna.
    completedMessage = It looks like we were not the first ones to send hardware to Duna.

    tag = SCANsat
    prestige = Significant
    targetBody = Duna
    agent = Anomaly Surveyor Group
    maxCompletions = 1

    rewardFunds = 55000.0
    rewardScience = 6.0
    rewardReputation = 5.0

    DATA
    {
        type = double
        latitude = -2.4141861222672
        longitude = -5.32288898858919
        altitude = 5
    }

    PARAMETER
    {
        name = WP0
        type = All
        title = Investigate the metallic object

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType
            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint
            index = 0
            distance = 10
        }
    }

    BEHAVIOUR
    {
        name = WaypointGenerator
        type = WaypointGenerator

        WAYPOINT
        {
            name = Metallic Object
            icon = ContractPacks/AnomalySurveyor/Icons/unknown
            latitude = @/latitude
            longitude = @/longitude
            altitude = @/altitude
        }
    }

    BEHAVIOUR
    {
        type = DialogBox

        DIALOG_BOX
        {
            title = Metallic Object
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Strategy_ScienceGuy
                animation = idle_lookAround
            }

            TEXT
            {
                text = It is a rover, but it is not one of ours. It looks like it was built for only a few months of exploration. Judging by the worn wheels and weathered panels, the little machine simply refused to stop.
            }

        }

        DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Instructor_Wernher
                animation = true_nodB
            }

            TEXT
            {
                text = It seems strangely lonely. Maybe it was once part of a pair.
        }
    }

    REQUIREMENT
    {
        name = Orbit
        type = Orbit
    }

    REQUIREMENT:NEEDS[SCANsat]
    {
        name = WP0
        type = SCANsatLocationCoverage
        latitude = @/latitude
        longitude = @/longitude
        title = Must have scanned the correct location on @targetBody with the anomaly scanner
    }
}
