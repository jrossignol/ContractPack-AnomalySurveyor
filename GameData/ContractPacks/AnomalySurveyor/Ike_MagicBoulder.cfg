// Contract for the magic boulder on Ike
// Author: jaheay

CONTRACT_TYPE
{
    name = AS_Ike_MagicBoulder
    group = AnomalySurveyor

    sortKey = 02.04
    genericTitle = Undiscovered anomaly near Duna
    genericDescription = Ike has a suspiciously boulder-shaped problem.

    title = Investigate an unusual object on Ike
    description = An unusual object has been reported on the surface of Ike.  It may be a meteorite, but the readings are odd enough to justify a closer look.
    synopsis = Investigate the unusual object on Ike.
    completedMessage = Boulder observed.  We are still not ready to call it normal.

    tag = SCANsat
    prestige = Significant
    targetBody = Ike
    agent = Anomaly Surveyor Group
    maxCompletions = 1

    rewardFunds = 65000.0
    rewardScience = 8.0
    rewardReputation = 5.0

    DATA
    {
        type = double
        latitude = -11.3789471812519
        longitude = 27.3079585517134
        altitude = 9
    }

    PARAMETER
    {
        name = WP0
        type = All
        title = Investigate the unusual object

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType
            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint
            index = 0
            distance = 50
        }
    }

    BEHAVIOUR
    {
        name = WaypointGenerator
        type = WaypointGenerator

        WAYPOINT
        {
            name = Unusual Object
            icon = ContractPacks/AnomalySurveyor/Icons/unknown
            latitude = @/latitude
            longitude = @/longitude
            altitude = @/altitude
        }
    }

    BEHAVIOUR
    {
        type = DialogBox

        DIALOG_BOX
        {
            title = Unusual Object
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Instructor_Wernher
                animation = idle_lookAround
            }

            TEXT
            {
                text = It is a boulder. Ike has been known to interfere with passing spacecraft, but this seems unusually delicate for Ike, given the lack of impact crater.
            }
        }


        DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Strategy_ScienceGuy
                animation = idle_lookAround
            }

            TEXT
            {
                text = Why is it glowing?
            }
        }


        DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = true_nodA
            }

            TEXT
            {
                text = Magic. It's a magic boulder. That explains everything.
            }
        }
    }

    REQUIREMENT
    {
        name = Orbit
        type = Orbit
    }

    REQUIREMENT:NEEDS[SCANsat]
    {
        name = WP0
        type = SCANsatLocationCoverage
        latitude = @/latitude
        longitude = @/longitude
        title = Must have scanned the correct location on @targetBody with the anomaly scanner
    }
}
