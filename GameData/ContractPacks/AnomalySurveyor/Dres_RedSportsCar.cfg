// Contract for the red sports car on Dres
// Author: jaheay

// Proximas Better Dres buries it 5km underground.
CONTRACT_TYPE:NEEDS[!BetterDres]
{
    name = AS_Dres_RedSportsCar
    group = AnomalySurveyor

    sortKey = 03.50
    genericTitle = Undiscovered anomaly on @targetBody
    genericDescription = Dres is absolutely real and apparently accepts used cars.

    title = Investigate a small red object on Dres
    description = Surface imagery shows a small object on Dres.  It is too regular to be natural, and too red for Dres.  We need to investigate it.
    synopsis = Investigate the small red object on Dres.
    completedMessage = We are going to need a better explanation for this one.

    tag = SCANsat
    prestige = Exceptional
    targetBody = Dres
    agent = Anomaly Surveyor Group
    maxCompletions = 1

    rewardFunds = 85000.0
    rewardScience = 10.0
    rewardReputation = 6.0

    DATA
    {
        type = double
        latitude = 1.9540816706326769
        longitude = 64.139579373369088
        altitude = 2
    }

    PARAMETER
    {
        name = WP0
        type = All
        title = Investigate the small red object

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType
            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint
            index = 0
            distance = 25
        }
    }

    BEHAVIOUR
    {
        name = WaypointGenerator
        type = WaypointGenerator

        WAYPOINT
        {
            name = Small Red Object
            icon = ContractPacks/AnomalySurveyor/Icons/unknown
            latitude = @/latitude
            longitude = @/longitude
            altitude = @/altitude
        }
    }

    BEHAVIOUR
    {
        type = DialogBox

        DIALOG_BOX
        {
            title = Crashed Object
            condition = PARAMETER_COMPLETED
            parameter = WP0

            KERBAL
            {
                animation = idle_wonder
            }

            TEXT
            {
                text = What a strange shiny rover! How did it get here?  And why is it so red?
            }
        }

        DIALOG_BOX
        {
            title = Crashed Object
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = false_disagreeC
            }

            TEXT
            {
                text = Maybe someone had payload capacity left over and an eager marketing department nearby.
            }
        }
    }

    REQUIREMENT
    {
        name = Orbit
        type = Orbit
    }

    REQUIREMENT:NEEDS[SCANsat]
    {
        name = WP0
        type = SCANsatLocationCoverage
        latitude = @/latitude
        longitude = @/longitude
        title = Must have scanned the correct location on @targetBody with the anomaly scanner
    }
}
