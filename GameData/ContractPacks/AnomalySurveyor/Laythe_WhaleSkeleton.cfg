// Contract for the whale skeleton on Laythe
// Author: jaheay

CONTRACT_TYPE
{
    name = AS_Laythe_WhaleSkeleton
    group = AnomalySurveyor

    sortKey = 04.03
    genericTitle = Undiscovered anomaly on Joolean moons
    genericDescription = Laythe has oceans. Apparently, it also has questions.

    title = Investigate an unusual structure on Laythe
    description = Surface imagery from Laythe shows an unusual structure on the limited terrestrial surface. Land nearby and inspect it on EVA.
    synopsis = Investigate the unusual structure on Laythe.
    completedMessage = We are not going to speculate about what it ate.

    tag = SCANsat
    prestige = Exceptional
    targetBody = Laythe
    agent = Anomaly Surveyor Group
    maxCompletions = 1

    rewardFunds = 90000.0
    rewardScience = 10.0
    rewardReputation = 6.0

    DATA
    {
        type = double
        latitude = 0.073789152511836778
        longitude = -162.52478906852744
        altitude = 0
    }

    PARAMETER
    {
        name = WP0
        type = All
        title = Investigate the unusual structure

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType
            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint
            index = 0
            distance = 35
        }
    }

    BEHAVIOUR
    {
        name = WaypointGenerator
        type = WaypointGenerator

        WAYPOINT
        {
            name = Unusual Structure
            icon = ContractPacks/AnomalySurveyor/Icons/unknown
            latitude = @/latitude
            longitude = @/longitude
            altitude = @/altitude
        }
    }

    BEHAVIOUR
    {
        type = DialogBox

        DIALOG_BOX
        {
            name = Unusual Structure
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Strategy_ScienceGuy
                animation = idle_wonder
            }

            TEXT
            {
                text = It is the skeleton of an enormous sea creature. How it arrived here remains unknown.
            }
        }

        DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = idle_lookAround
            }

            TEXT
            {
                text = The bowl of petunias does not clarify the matter.
            }
        }

        DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
            parameter = WP0

            KERBAL
            {
                animation = idle_wonder
            }

            TEXT
            {
                text = Neither does the altitude or the distance from the water.
            }
        }

        DIALOG_BOX
        {

            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Strategy_ScienceGuy
                animation = idle_lookAround
            }

            TEXT
            {
                text = Maybe it's not native? Space whales are known to migrate between planets, and this one may have been stranded here after a long journey.
            }
        }

        DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = false_disagreeC
            }

            TEXT
            {
                text = Space whales are not real. We have significantly more evidence to the contrary than we did a few minutes ago, but the official position remains unchanged.
            }
        }
    }

    REQUIREMENT
    {
        name = Orbit
        type = Orbit
    }

    REQUIREMENT:NEEDS[SCANsat]
    {
        name = WP0
        type = SCANsatLocationCoverage
        latitude = @/latitude
        longitude = @/longitude
        title = Must have scanned the correct location on @targetBody with the anomaly scanner
    }
}
