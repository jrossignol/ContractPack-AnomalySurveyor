// Contract for the whale skeleton on Laythe
// Author: jaheay

CONTRACT_TYPE
{
    name = AS_Laythe_WhaleSkeleton
    group = AnomalySurveyor

    sortKey = 04.03
    genericTitle = Undiscovered anomaly on Joolean moons
    genericDescription = Laythe has oceans. Apparently, it also has questions.

    title = Investigate a shoreline anomaly on Laythe
    description = Coastal survey imagery from Laythe shows an unusual structure near the shore.  Land nearby and inspect it on EVA.
    synopsis = Investigate the shoreline anomaly on Laythe.
    completedMessage = We are not going to speculate about what it ate.

    tag = SCANsat
    prestige = Exceptional
    targetBody = Laythe
    agent = Anomaly Surveyor Group
    maxCompletions = 1

    rewardFunds = 90000.0
    rewardScience = 10.0
    rewardReputation = 6.0

    DATA
    {
        type = double
        latitude = 0.0733812618629684
        longitude = -162.526660881571
        altitude = 1
    }

    PARAMETER
    {
        name = WP0
        type = All
        title = Investigate the shoreline anomaly

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType
            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint
            index = 0
            distance = 150
        }
    }

    BEHAVIOUR
    {
        name = WaypointGenerator
        type = WaypointGenerator

        WAYPOINT
        {
            name = Shoreline Anomaly
            icon = ContractPacks/AnomalySurveyor/Icons/unknown
            latitude = @/latitude
            longitude = @/longitude
            altitude = @/altitude
        }
    }

    BEHAVIOUR
    {
        type = DialogBox

        DIALOG_BOX
        {
            title = Shoreline Anomaly
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Strategy_ScienceGuy
            }

            TEXT
            {
                text = It is the skeleton of an enormous sea creature. How it arrived here remains unknown.
            }
        }

        DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = idle_lookAround
            }

            TEXT
            {
                text = How it arrived with a bowl of petunias is an entirely different category of unknown.
            }
        }

        DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
            parameter = WP0

            TEXT
            {
                text = How it arrived here, with a bowl of petunias, a kilometer above sea level, and several kilometers from the nearest ocean is a third, even grander category of unknown.
            }
        }

        DIALOG_BOX
        {

            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Strategy_ScienceGuy
            }

            TEXT
            {
                text = Maybe its not native? Space whales are known to migrate between planets, and this one may have been stranded here after a long journey.
            }
        }

        DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = false_disagreeC
            }

            TEXT
            {
                text = Space whales are not real. We have significantly more evidence than we did five minutes ago, but the official position remains unchanged.
            }
        }
    }

    REQUIREMENT
    {
        name = Orbit
        type = Orbit
    }

    REQUIREMENT:NEEDS[SCANsat]
    {
        name = WP0
        type = SCANsatLocationCoverage
        latitude = @/latitude
        longitude = @/longitude
        title = Must have scanned the correct location on @targetBody with the anomaly scanner
    }
}
