// Additional OPM mohole contracts.
// Author: jaheay
// Requires Outer Planets Mod.

CONTRACT_TYPE:NEEDS[OPM]
{
    name = AS_OPM_Plockhole
    group = AnomalySurveyor

    sortKey = 06.01
    genericTitle = Undiscovered anomaly on @targetBody
    genericDescription = Long-range survey data has identified an unusual polar surface feature. It is worth a closer look.

    title = Investigate geological formation on Plock
    description = Orbital survey data from Plock shows an unusual formation near the north pole. Land nearby and inspect the site.
    synopsis = Investigate the unusual polar formation on Plock.
    completedMessage = The formation is real. It is also very familiar, which gives us more questions than awnsers.

    // Indicates a contract where SCANsat multipliers should be applied
    tag = SCANsat

    prestige = Exceptional
    targetBody = Plock
    agent = Anomaly Surveyor Group
    maxCompletions = 1

    rewardFunds = 160000.0
    rewardScience = 18.0
    rewardReputation = 8.0

    DATA
    {
        type = double
        latitude = 90.0
        longitude = 0.0
        // Nearby rover terrain altitude from quicksave-opmflags.sfs.
        altitude = 4970.7987635149912
    }

    PARAMETER
    {
        name = WP0
        type = All
        title = Investigate the Plockhole

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType
            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint
            index = 0
            distance = 3000
        }
    }

    BEHAVIOUR
    {
        name = WaypointGenerator
        type = WaypointGenerator

        WAYPOINT
        {
            name = Plockhole
            icon = ContractPacks/AnomalySurveyor/Icons/unknown
            latitude = @/latitude
            longitude = @/longitude
            altitude = @/altitude
        }
    }

    BEHAVIOUR
    {
        type = DialogBox

        DIALOG_BOX
        {
            title = Plockhole
            condition = PARAMETER_COMPLETED
            parameter = WP0

            KERBAL
            {
            }

            TEXT
            {
                text = Oh, another one. This one is a Plockhole.
            }
        }

        DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = false_disagreeC
            }

            TEXT
            {
                text = We are not calling it a Plockhole.
            }
        }
    }

    REQUIREMENT
    {
        type = FlyBy
    }

    REQUIREMENT
    {
        type = CompleteContract
        contractType = AS_Moho_Mohole

        title = Must have investigated the Moho anomaly first
    }

    REQUIREMENT:NEEDS[SCANsat]
    {
        name = WP0
        type = SCANsatLocationCoverage
        scanType = Anomaly

        latitude = @/latitude
        longitude = @/longitude

        title = Must have scanned the correct location on @targetBody with the anomaly scanner
    }
}

CONTRACT_TYPE:NEEDS[OPM]
{
    name = AS_OPM_Nisseehole
    group = AnomalySurveyor

    sortKey = 06.02
    genericTitle = Undiscovered anomaly on @targetBody
    genericDescription = Survey instruments have flagged a compact polar anomaly. The readings are unusual enough to justify surface inspection.

    title = Investigate geological formation on Nissee
    description = Orbital survey data from Nissee shows an unusual formation near the north pole. Land nearby and inspect the site on EVA.
    synopsis = Investigate the unusual polar formation on Nissee.
    completedMessage = The formation has been confirmed.  We found another one.

    // Indicates a contract where SCANsat multipliers should be applied
    tag = SCANsat

    prestige = Exceptional
    targetBody = Nissee
    agent = Anomaly Surveyor Group
    maxCompletions = 1

    rewardFunds = 180000.0
    rewardScience = 20.0
    rewardReputation = 8.5

    DATA
    {
        type = double
        latitude = 90.0
        longitude = 0.0
        // Nearby rover terrain altitude from quicksave-opmflags.sfs.
        altitude = 9816.335969159918
    }

    PARAMETER
    {
        name = WP0
        type = All
        title = Investigate the Nisseehole

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType
            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint
            index = 0
            distance = 3000
        }
    }

    BEHAVIOUR
    {
        name = WaypointGenerator
        type = WaypointGenerator

        WAYPOINT
        {
            name = Nisseehole
            icon = ContractPacks/AnomalySurveyor/Icons/unknown
            latitude = @/latitude
            longitude = @/longitude
            altitude = @/altitude
        }
    }

    BEHAVIOUR
    {
        type = DialogBox

        DIALOG_BOX
        {
            title = Nisseehole
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Instructor_Wernher
                animation = idle_lookAround
            }

            TEXT
            {
                text = Oh. Another one! This one is a Nisseehole.
            }
        }

        DIALOG_BOX
        {
            condition = PARAMETER_COMPLETED
            parameter = WP0

            INSTRUCTOR
            {
                name = Instructor_Gene
                animation = idle_lookAround
            }

            TEXT
            {
                text = The official terminology remains "polar geological formation".
            }
        }
    }

    REQUIREMENT
    {
        type = FlyBy
    }

    REQUIREMENT
    {
        type = CompleteContract
        contractType = AS_Moho_Mohole

        title = Must have investigated the Moho anomaly first
    }

    REQUIREMENT:NEEDS[SCANsat]
    {
        name = WP0
        type = SCANsatLocationCoverage
        scanType = Anomaly

        latitude = @/latitude
        longitude = @/longitude

        title = Must have scanned the correct location on @targetBody with the anomaly scanner
    }
}
