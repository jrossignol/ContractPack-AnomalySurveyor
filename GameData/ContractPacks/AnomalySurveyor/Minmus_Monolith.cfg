// Contract for visiting the Minmus monolith.
//   Derived from Anomaly Surveyor AS_Mun_Monolith.

CONTRACT_TYPE
{
    name = AS_Minmus_Monolith
    group = AnomalySurveyor

    sortKey = 01.03.3
    genericTitle = Undiscovered anomaly on Minmus
    genericDescription = Are anomalies on Minmus anything like the ones on Kerbin?

    title = Investigate TMA-7 on Minmus
    description = We've managed to track one of the Kerbin monolith signals to Minmus.  Let's head out there and see where this monolith takes us.
    synopsis = Investigate TMA-7.
    completedMessage = The monolith is sending a signal somewhere away from Kerbin...

    // Level 2 prestige
    prestige = Significant

    targetBody = Minmus

    // Always offered by the Anomaly Surveyor Group
    agent = Anomaly Surveyor Group

    // Can do the contract once
    maxCompletions = 1

    // Contract rewards
    rewardFunds = 25000
    rewardScience = 10.0
    rewardReputation = 10.0

    PARAMETER
    {
        name = WP0
        type = All
        title = Visit TMA-7

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType

            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint

            index = 0
            distance = 25
        }
    }

    BEHAVIOUR
    {
        name = WaypointGenerator
        type = WaypointGenerator

        WAYPOINT
        {
            // The name of the waypoint - displayed on the marker
            name = TMA-7
            icon = ContractPacks/AnomalySurveyor/Icons/monolith

            // The location
            latitude = 23.7759194904872
            longitude = 60.0463591764103
            altitude = 0.0
        }
    }

    BEHAVIOUR
    {
        type = DialogBox

        DIALOG_BOX
        {
            title = TMA-7
            condition = PARAMETER_COMPLETED
            parameter = WP0

            KERBAL
            {
            }
            TEXT
            {
                text = Pretty tough to miss this thing on Minmus.  Unless there is a mint chip flavoured monolith around here somewhere?
            }
        }
    }

    REQUIREMENT
    {
        name = Orbit
        type = Orbit
    }

    REQUIREMENT
    {
        type = AtLeast

        count = 2

        REQUIREMENT
        {
            type = CompleteContract
            contractType = AS_Kerbin_Monolith_Additional.0

            title = Must have visited a similar anomaly on Kerbin
        }

        REQUIREMENT
        {
            type = CompleteContract
            contractType = AS_Kerbin_Monolith_Additional.1

            title = Must have visited a similar anomaly on Kerbin
        }

        REQUIREMENT
        {
            type = CompleteContract
            contractType = AS_Kerbin_Monolith_Additional.2

            title = Must have visited a similar anomaly on Kerbin
        }

        REQUIREMENT
        {
            type = CompleteContract
            contractType = AS_Kerbin_Monolith_Additional.3

            title = Must have visited a similar anomaly on Kerbin
        }
    }
}
